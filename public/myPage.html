    <section id="mypage-header">
        <div class="container">
            <h1># MYPAGE</h1>

    <!-- mypage -->

    <section id="mypage" class="section">
        <div class="mypage-container">
            <h1 class="title">마이페이지</h1>
            <div class="btn-container">
                <button class="btn edit-btn">수정하기</button>
            </div>
            <div class="mypage-container-list">

                    <label for="">이름</label>

                </div>
                <div class="phone">
                    <label for="">전화번호</label>
                    <input id="phone" type="text">
                </div>
                <div class="password-title">
                    <i class="password-icon fas fa-unlock-alt"></i>
                    <h2>비밀번호 변경</h4>
                </div>
                <div class="password">
                    <label for="">비밀번호</label>
                    <input id="password" type="password">
                </div>
                <div class="passwordVerify">
                    <label for="">비밀번호 확인</label>
                    <input id="passwordVerify" type="password">
                </div>
            </div>
        </div>
    </section>
